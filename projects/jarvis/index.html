<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贾维斯 - 全息界面系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* 返回主页按钮 */
        .back-home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            text-decoration: none;
            font-size: 14px;
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .back-home-btn:hover {
            background: rgba(0, 212, 255, 0.4);
            border-color: #00d4ff;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* Boot Screen */
        .boot-screen {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .boot-container {
            width: 600px;
            padding: 40px;
        }

        .boot-title {
            font-size: 48px;
            text-align: center;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            color: #00F0FF;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
        }

        .boot-progress {
            margin: 20px 0;
        }

        .boot-label {
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
            animation-delay: 0.3s;
        }

        .boot-bar {
            height: 4px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
            animation-delay: 0.5s;
        }

        .boot-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            width: 0%;
            transition: width 0.3s ease;
        }

        .boot-status {
            font-size: 12px;
            color: #00ff88;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
            animation-delay: 0.7s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Intro Screen */
        .intro-screen {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .intro-text {
            font-size: 64px;
            text-align: center;
            opacity: 0;
            animation: introFade 3s ease forwards;
            color: #00F0FF;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.8), 0 0 60px rgba(0, 240, 255, 0.4);
        }

        .intro-sub {
            font-size: 18px;
            text-align: center;
            margin-top: 20px;
            opacity: 0;
            animation: introFade 3s ease forwards;
            animation-delay: 1s;
            color: rgba(0, 240, 255, 0.6);
        }

        @keyframes introFade {
            0%, 30% { opacity: 0; transform: translateY(20px); }
            50%, 80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* Main App */
        .main-app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Video Feed */
        .video-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 280px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(10, 10, 15, 0.8);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .video-header {
            padding: 10px 15px;
            font-size: 11px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex;
            justify-content: space-between;
            background: rgba(0, 47, 167, 0.2);
        }

        .video-wrapper {
            position: relative;
            width: 280px;
            height: 210px;
        }

        .video-controls {
            padding: 10px 12px;
            font-size: 11px;
            background: rgba(0, 47, 167, 0.15);
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }

        .control-item {
            margin: 4px 0;
            color: rgba(0, 240, 255, 0.85);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-item::before {
            content: '▸';
            color: #00ff88;
            font-size: 9px;
        }

        #videoFeed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #handCanvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        /* 3D Canvas */
        #threeCanvas {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        /* HUD Overlay */
        .hud-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        .hud-corner {
            position: absolute;
            width: 100px;
            height: 100px;
        }

        .hud-corner.top-left {
            top: 20px;
            left: 20px;
        }

        .hud-corner.top-right {
            top: 20px;
            right: 20px;
        }

        .hud-corner.bottom-right {
            bottom: 20px;
            right: 20px;
        }

        .hud-border {
            position: absolute;
            background: rgba(0, 240, 255, 0.4);
        }

        .hud-border.horizontal {
            height: 2px;
            width: 80px;
        }

        .hud-border.vertical {
            width: 2px;
            height: 80px;
        }

        /* Status Panel */
        .status-panel {
            position: fixed;
            top: 30px;
            left: 320px;
            padding: 20px 25px;
            background: rgba(10, 10, 15, 0.75);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            font-size: 13px;
            backdrop-filter: blur(10px);
            min-width: 220px;
        }

        .status-title {
            font-size: 16px;
            margin-bottom: 15px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            letter-spacing: 2px;
        }

        .status-item {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            gap: 30px;
        }

        .status-value {
            color: #00d4ff;
            font-weight: bold;
        }

        .status-value.active {
            color: #00ff88;
        }

        .status-value.warning {
            color: #FFD700;
        }

        /* Gauge Panel */
        .gauge-panel {
            position: fixed;
            top: 30px;
            right: 320px;
            padding: 20px;
            background: rgba(10, 10, 15, 0.75);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .gauge {
            margin: 12px 0;
        }

        .gauge-label {
            font-size: 12px;
            margin-bottom: 6px;
            color: rgba(0, 240, 255, 0.8);
            letter-spacing: 1px;
        }

        .gauge-bar {
            height: 10px;
            background: rgba(0, 240, 255, 0.15);
            border-radius: 5px;
            overflow: hidden;
            width: 150px;
        }

        .gauge-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.15s ease;
            border-radius: 5px;
        }

        /* Intel Panel */
        .intel-panel {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            width: 220px;
            padding: 25px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.5);
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 80;
            backdrop-filter: blur(15px);
        }

        .intel-panel.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .intel-title {
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            letter-spacing: 2px;
        }

        .intel-item {
            margin: 10px 0;
            font-size: 13px;
            color: rgba(0, 240, 255, 0.9);
        }

        /* Hex Dump */
        .hex-dump {
            position: fixed;
            bottom: 310px;
            left: 20px;
            width: 280px;
            padding: 15px;
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            font-size: 11px;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .hex-title {
            font-size: 12px;
            margin-bottom: 10px;
            color: #00ff88;
            letter-spacing: 1px;
        }

        .hex-content {
            line-height: 1.6;
            opacity: 0.8;
            color: rgba(0, 240, 255, 0.7);
            font-family: 'Courier New', monospace;
        }

        /* Loading indicator */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 240, 255, 0.2);
            border-top-color: #00F0FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            font-size: 14px;
            color: rgba(0, 240, 255, 0.8);
        }

        /* Scanlines effect */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 90;
        }

        /* Vignette effect */
        .vignette {
            position: fixed;
            inset: 0;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 85;
        }

        /* Glow effects */
        .glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
        }

        .glow-strong {
            text-shadow: 0 0 15px currentColor, 0 0 30px currentColor, 0 0 45px currentColor;
        }

        /* Center title */
        .center-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: rgba(0, 240, 255, 0.3);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            letter-spacing: 8px;
            z-index: 15;
            pointer-events: none;
            text-align: center;
        }

        /* Return Button */
        .return-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 12px 24px;
            background: rgba(10, 10, 15, 0.75);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 8px;
            color: #00F0FF;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            cursor: pointer;
            z-index: 1001;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .return-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            border-color: #00F0FF;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            transform: translateY(-2px);
        }

        .return-btn::before {
            content: '←';
            font-size: 16px;
        }

        /* Responsive adjustments */
        @media (max-width: 1200px) {
            .hex-dump { width: 240px; }
            .video-container { width: 240px; }
            .video-wrapper { width: 240px; height: 180px; }
            .return-btn { top: 20px; right: 20px; padding: 10px 18px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- 返回主页按钮 -->
    <a href="../../index.html" class="back-home-btn" title="返回主页">← 返回主页</a>

    <div id="root"></div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.min.js"></script>

    <script>
        // ========== CONFIGURATION ==========
        const CONFIG = {
            earthRadius: 2,
            terrainRadius: 2.8,
            particleCount: 8000,
            gridLines: 24,
            expansionSpeed: 0.15,
            rotationSpeed: 0.003,
            gestureThreshold: 0.08,
            hysteresisWindow: 5,
            smoothingFactor: 0.15,
            soundsEnabled: true,
            autoRotate: true,
            maxExpansion: 0.45,
            minExpansion: 0
        };

        // ========== STATE MANAGEMENT ==========
        const AppState = {
            phase: 'boot', // boot -> intro -> main
            bootProgress: 0,
            bootSteps: [
                '正在初始化核心系统...',
                '正在加载全息矩阵...',
                '正在建立神经链接...',
                '正在校准手势识别...',
                '正在同步视觉处理器...',
                '系统就绪'
            ],
            currentStep: 0,

            // Hand tracking
            leftHand: null,
            rightHand: null,
            handsDetected: false,
            handCount: 0,

            // Gesture values (smoothed)
            expansion: 0,
            targetExpansion: 0,
            rotationX: 0,
            rotationY: 0,
            targetRotationX: 0,
            targetRotationY: 0,
            rightPinch: false,

            // Raw gesture values (for display)
            rawExpansion: 0,
            rawRotationX: 0,
            rawRotationY: 0,

            // Hysteresis buffers
            expansionHistory: [],
            rotationXHistory: [],
            rotationYHistory: [],

            // Intel panel
            intelVisible: false,

            // Performance
            fps: 0,
            frameCount: 0,
            lastFpsUpdate: Date.now(),

            // Animation
            time: 0
        };

        // ========== SOUND SERVICE ==========
        const SoundService = {
            audioContext: null,
            initialized: false,

            init() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.initialized = true;
                } catch(e) {
                    console.warn('Audio not available');
                }
            },

            resume() {
                if (this.audioContext && this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
            },

            playTone(freq, duration, type = 'sine', volume = 0.08) {
                if (!this.audioContext || !this.initialized || !CONFIG.soundsEnabled) return;

                try {
                    this.resume();
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();

                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.value = volume;
                    gain.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);

                    osc.connect(gain);
                    gain.connect(this.audioContext.destination);

                    osc.start();
                    osc.stop(this.audioContext.currentTime + duration);
                } catch(e) {}
            },

            blip() { this.playTone(1200, 0.08, 'square', 0.04); },
            lock() { this.playTone(800, 0.15, 'triangle', 0.06); },
            servo() { this.playTone(350, 0.08, 'sawtooth', 0.02); },
            boot() { this.playTone(500, 0.2, 'triangle', 0.08); },

            playBootSequence(callback) {
                const frequencies = [200, 300, 400, 500, 600, 800, 1000, 1200];
                let i = 0;

                const playNext = () => {
                    if (i < frequencies.length) {
                        this.playTone(frequencies[i], 0.15, 'triangle', 0.07);
                        i++;
                        setTimeout(playNext, 250);
                    } else if (callback) {
                        callback();
                    }
                };

                playNext();
            }
        };

        // ========== SPEECH SERVICE ==========
        const SpeechService = {
            speak(text, rate = 0.85) {
                if (!window.speechSynthesis) return;

                try {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = rate;
                    utterance.pitch = 0.9;
                    utterance.volume = 0.7;

                    // Try to use a suitable voice
                    const voices = speechSynthesis.getVoices();
                    const preferred = voices.find(v =>
                        v.lang === 'zh-CN' ||
                        v.lang === 'zh-TW' ||
                        v.name.includes('Google') ||
                        v.name.includes('Ting-Ting') ||
                        v.name.includes('Sin-Ji')
                    );
                    if (preferred) utterance.voice = preferred;

                    speechSynthesis.speak(utterance);
                } catch(e) {}
            },

            preloadVoices() {
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.getVoices();
                }
            }
        };

        // ========== MEDIAPIPE SERVICE ==========
        const MediaPipeService = {
            hands: null,
            camera: null,
            initialized: false,
            videoElement: null,

            async init(videoElement, onResults) {
                this.videoElement = videoElement;

                try {
                    // Check if MediaPipe Hands is loaded
                    if (typeof Hands === 'undefined') {
                        console.error('MediaPipe Hands library not loaded');
                        return false;
                    }

                    this.hands = new Hands({
                        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
                    });

                    this.hands.setOptions({
                        maxNumHands: 2,
                        modelComplexity: 1,
                        minDetectionConfidence: 0.7,
                        minTrackingConfidence: 0.5
                    });

                    this.hands.onResults(onResults);

                    // Try Camera utility first, then manual approach
                    if (typeof Camera !== 'undefined') {
                        this.camera = new Camera(videoElement, {
                            onFrame: async () => {
                                if (this.hands) {
                                    await this.hands.send({ image: videoElement });
                                }
                            },
                            width: 640,
                            height: 480
                        });
                        await this.camera.start();
                    } else {
                        // Manual camera setup
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: { width: 640, height: 480, facingMode: 'user' }
                        });
                        videoElement.srcObject = stream;
                        await videoElement.play();

                        // Manual frame processing
                        const processFrame = async () => {
                            if (this.hands && videoElement.readyState >= 2) {
                                await this.hands.send({ image: videoElement });
                            }
                            requestAnimationFrame(processFrame);
                        };
                        processFrame();
                    }

                    this.initialized = true;
                    console.log('MediaPipe initialized successfully');
                    return true;
                } catch (error) {
                    console.error('MediaPipe init error:', error);
                    return false;
                }
            },

            stop() {
                if (this.camera) {
                    this.camera.stop();
                }
                if (this.videoElement && this.videoElement.srcObject) {
                    this.videoElement.srcObject.getTracks().forEach(track => track.stop());
                }
            }
        };

        // ========== THREE.JS SCENE ==========
        let scene, camera, renderer, earthGroup, terrainGroup, particles, ambientParticles;
        let gridRings = [];
        let animationId;
        let clock;

        function initThreeJS() {
            clock = new THREE.Clock();

            // Create canvas
            const canvas = document.createElement('canvas');
            canvas.id = 'threeCanvas';
            document.querySelector('.main-app').appendChild(canvas);

            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0a0f, 0.05);

            // Camera
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                100
            );
            camera.position.set(0, 0, 6);

            // Renderer
            renderer = new THREE.WebGLRenderer({
                canvas,
                antialias: true,
                alpha: true,
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0a0a0f, 1);

            // Create groups
            earthGroup = new THREE.Group();
            scene.add(earthGroup);

            terrainGroup = new THREE.Group();
            earthGroup.add(terrainGroup);

            // Build scene
            createEarth();
            createTerrainParticles();
            createAmbientParticles();
            createGridRings();
            createLights();
            createCenterGlow();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
        }

        function createEarth() {
            // Core sphere (solid base)
            const coreGeo = new THREE.SphereGeometry(CONFIG.earthRadius * 0.95, 48, 48);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0x001530,
                transparent: true,
                opacity: 0.4
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            earthGroup.add(core);

            // Main wireframe
            const wireGeo = new THREE.SphereGeometry(CONFIG.earthRadius, 32, 32);
            const wireMat = new THREE.MeshBasicMaterial({
                color: 0x00F0FF,
                wireframe: true,
                transparent: true,
                opacity: 0.12
            });
            const wireframe = new THREE.Mesh(wireGeo, wireMat);
            earthGroup.add(wireframe);

            // Latitude lines
            for (let i = -5; i <= 5; i++) {
                if (i === 0) continue;
                const radius = CONFIG.earthRadius * Math.cos(i * 0.25);
                const y = CONFIG.earthRadius * Math.sin(i * 0.25);

                const ringGeo = new THREE.TorusGeometry(radius, 0.01, 8, 64);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: 0x00F0FF,
                    transparent: true,
                    opacity: 0.08
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                ring.position.y = y;
                earthGroup.add(ring);
            }

            // Longitude lines
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const curve = new THREE.EllipseCurve(0, 0, CONFIG.earthRadius, CONFIG.earthRadius, 0, Math.PI * 2, false, 0);
                const points = curve.getPoints(64);
                const geo = new THREE.BufferGeometry().setFromPoints(
                    points.map(p => new THREE.Vector3(p.x, p.y, 0))
                );
                const mat = new THREE.LineBasicMaterial({
                    color: 0x00F0FF,
                    transparent: true,
                    opacity: 0.08
                });
                const line = new THREE.Line(geo, mat);
                line.rotation.y = angle;
                earthGroup.add(line);
            }
        }

        function createTerrainParticles() {
            const positions = [];
            const colors = [];
            const sizes = [];
            const originalPositions = [];

            // Generate particles on sphere surface
            for (let i = 0; i < CONFIG.particleCount; i++) {
                // Fibonacci sphere distribution
                const phi = Math.acos(1 - 2 * (i + 0.5) / CONFIG.particleCount);
                const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);

                const x = CONFIG.earthRadius * Math.sin(phi) * Math.cos(theta);
                const y = CONFIG.earthRadius * Math.sin(phi) * Math.sin(theta);
                const z = CONFIG.earthRadius * Math.cos(phi);

                positions.push(x, y, z);
                originalPositions.push(x, y, z);

                // Color gradient: cyan to green
                const t = (i / CONFIG.particleCount);
                const r = 0;
                const g = 0.7 + t * 0.3;
                const b = 1.0 - t * 0.4;
                colors.push(r, g, b);

                // Size variation
                sizes.push(0.02 + Math.random() * 0.02);
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            // Store original positions for expansion animation
            geometry.userData.originalPositions = originalPositions;

            const material = new THREE.PointsMaterial({
                size: 0.03,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            terrainGroup.add(particles);
        }

        // ========== HAND TRACKING PROCESSING ==========
        function processHandResults(results) {
            AppState.handsDetected = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
            AppState.handCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;

            // Reset hands if none detected
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                AppState.leftHand = null;
                AppState.rightHand = null;
                // Gradually return to default state
                AppState.targetExpansion *= 0.95;
                AppState.targetRotationX *= 0.95;
                AppState.targetRotationY *= 0.95;
                updateUI();
                return;
            }

            // Process each detected hand
            results.multiHandLandmarks.forEach((landmarks, index) => {
                const handedness = results.multiHandedness[index].label;
                // MediaPipe labels are mirrored, so Right label = actual left hand
                const isLeft = handedness === 'Right';
                const hand = processHandData(landmarks, isLeft);

                if (isLeft) {
                    AppState.leftHand = hand;
                    processLeftHandGestures(hand);
                } else {
                    AppState.rightHand = hand;
                    processRightHandGestures(hand);
                }
            });

            // Update hand skeleton visualization
            updateHandSkeleton(results);
            updateUI();
        }

        function processHandData(landmarks, isLeft) {
            // Key landmark indices
            const WRIST = 0;
            const THUMB_TIP = 4;
            const INDEX_TIP = 8;
            const INDEX_MCP = 5;
            const MIDDLE_TIP = 12;
            const MIDDLE_MCP = 9;
            const RING_TIP = 16;
            const RING_MCP = 13;
            const PINKY_TIP = 20;
            const PINKY_MCP = 17;

            const wrist = landmarks[WRIST];

            // Palm center calculation
            const palmX = (wrist.x + landmarks[INDEX_MCP].x + landmarks[MIDDLE_MCP].x +
                          landmarks[RING_MCP].x + landmarks[PINKY_MCP].x) / 5;
            const palmY = (wrist.y + landmarks[INDEX_MCP].y + landmarks[MIDDLE_MCP].y +
                          landmarks[RING_MCP].y + landmarks[PINKY_MCP].y) / 5;
            const palmZ = (wrist.z || 0);

            // Pinch detection (thumb to index distance)
            const pinchDist = Math.sqrt(
                Math.pow(landmarks[THUMB_TIP].x - landmarks[INDEX_TIP].x, 2) +
                Math.pow(landmarks[THUMB_TIP].y - landmarks[INDEX_TIP].y, 2) +
                Math.pow((landmarks[THUMB_TIP].z || 0) - (landmarks[INDEX_TIP].z || 0), 2)
            );

            // Finger spread calculation
            const fingerSpread = calculateFingerSpread(landmarks);

            // Calculate average z-depth (for distance estimation)
            const avgZ = landmarks.reduce((sum, lm) => sum + (lm.z || 0), 0) / landmarks.length;

            return {
                landmarks,
                palmCenter: { x: palmX, y: palmY, z: palmZ },
                pinchDist,
                fingerSpread,
                avgZ,
                isPinching: pinchDist < 0.07,
                isOpen: fingerSpread > 0.25,
                isClosed: fingerSpread < 0.12,
                isLeft
            };
        }

        function calculateFingerSpread(landmarks) {
            const fingerTips = [4, 8, 12, 16, 20];
            const fingerBases = [2, 5, 9, 13, 17];

            let totalSpread = 0;
            let count = 0;

            for (let i = 0; i < fingerTips.length; i++) {
                for (let j = i + 1; j < fingerTips.length; j++) {
                    const tip1 = landmarks[fingerTips[i]];
                    const tip2 = landmarks[fingerTips[j]];

                    const dist = Math.sqrt(
                        Math.pow(tip1.x - tip2.x, 2) +
                        Math.pow(tip1.y - tip2.y, 2)
                    );
                    totalSpread += dist;
                    count++;
                }
            }

            return totalSpread / count;
        }

        function processLeftHandGestures(hand) {
            if (!hand) return;

            // Expansion based on finger spread
            // Normalize spread: closed fist ~0.1, open hand ~0.35+
            const normalizedSpread = Math.max(0, Math.min(1, (hand.fingerSpread - 0.12) / 0.23));

            // Apply expansion limit
            AppState.rawExpansion = normalizedSpread;
            AppState.targetExpansion = normalizedSpread * CONFIG.maxExpansion;

            // Add to hysteresis buffer for stability
            AppState.expansionHistory.push(normalizedSpread);
            if (AppState.expansionHistory.length > CONFIG.hysteresisWindow) {
                AppState.expansionHistory.shift();
            }

            // Play servo sound when gesture changes significantly
            if (Math.abs(normalizedSpread - (AppState.expansionHistory[0] || 0)) > 0.05) {
                SoundService.servo();
            }
        }

        function processRightHandGestures(hand) {
            if (!hand) return;

            // Rotation based on palm position relative to center
            // Convert from [0,1] to [-1,1] range
            const normalizedX = (hand.palmCenter.x - 0.5) * 2;
            const normalizedY = (hand.palmCenter.y - 0.5) * 2;

            // Store raw values
            AppState.rawRotationX = normalizedY;
            AppState.rawRotationY = normalizedX;

            // Apply to rotation targets with scaling
            AppState.targetRotationX = normalizedY * 0.6;
            AppState.targetRotationY = normalizedX * 0.9;

            // Hysteresis buffers
            AppState.rotationXHistory.push(normalizedY);
            AppState.rotationYHistory.push(normalizedX);

            if (AppState.rotationXHistory.length > CONFIG.hysteresisWindow) {
                AppState.rotationXHistory.shift();
            }
            if (AppState.rotationYHistory.length > CONFIG.hysteresisWindow) {
                AppState.rotationYHistory.shift();
            }

            // Intel panel toggle on pinch
            const wasPinching = AppState.rightPinch;
            AppState.rightPinch = hand.isPinching;

            if (AppState.rightPinch && !wasPinching) {
                AppState.intelVisible = !AppState.intelVisible;
                SoundService.lock();
                updateIntelPanel();
            }
        }

        function updateHandSkeleton(results) {
            const canvas = document.getElementById('handCanvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            canvas.width = 280;
            canvas.height = 210;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!results.multiHandLandmarks) return;

            // Draw each hand
            results.multiHandLandmarks.forEach((landmarks, idx) => {
                const handedness = results.multiHandedness[idx].label;
                const isLeft = handedness === 'Right'; // Mirrored

                drawSkeleton(ctx, landmarks, canvas.width, canvas.height, isLeft);
            });
        }

        function drawSkeleton(ctx, landmarks, width, height, isLeft) {
            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 4],     // Thumb
                [0, 5], [5, 6], [6, 7], [7, 8],     // Index
                [0, 9], [9, 10], [10, 11], [11, 12], // Middle
                [0, 13], [13, 14], [14, 15], [15, 16], // Ring
                [0, 17], [17, 18], [18, 19], [19, 20], // Pinky
                [5, 9], [9, 13], [13, 17]            // Palm connections
            ];

            // Line style
            ctx.strokeStyle = isLeft ? '#00ff88' : '#00d4ff';
            ctx.lineWidth = 2;

            // Draw connections
            connections.forEach(([start, end]) => {
                const p1 = landmarks[start];
                const p2 = landmarks[end];

                ctx.beginPath();
                ctx.moveTo(p1.x * width, p1.y * height);
                ctx.lineTo(p2.x * width, p2.y * height);
                ctx.stroke();
            });

            // Point style
            ctx.fillStyle = isLeft ? '#00ff88' : '#00F0FF';

            // Draw landmarks
            landmarks.forEach((lm, i) => {
                const size = [0, 4, 8, 12, 16, 20].includes(i) ? 4 : 2.5;
                ctx.beginPath();
                ctx.arc(lm.x * width, lm.y * height, size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Palm center indicator
            const palmCenter = {
                x: (landmarks[0].x + landmarks[5].x + landmarks[9].x + landmarks[13].x + landmarks[17].x) / 5,
                y: (landmarks[0].y + landmarks[5].y + landmarks[9].y + landmarks[13].y + landmarks[17].y) / 5
            };

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(palmCenter.x * width, palmCenter.y * height, 15, 0, Math.PI * 2);
            ctx.stroke();
        }

        function updateHexDump() {

            const expansionHex = Math.round(AppState.expansion * 255).toString(16).toUpperCase().padStart(2, '0');
            const rotationHex = Math.round((AppState.rotationX + AppState.rotationY) * 127 + 128).toString(16).toUpperCase().padStart(2, '0');
            const randomBytes = Math.random().toString(16).toUpperCase().slice(2, 8);

            hexContent.textContent = `${timestamp} | ${expansionHex} ${rotationHex} | ${randomBytes}`;
        }

        // ========== ANIMATION LOOP ==========
        let lastTime = performance.now();

        function animate() {
            const currentTime = performance.now();
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            AppState.time += deltaTime;

            // FPS calculation
            AppState.frameCount++;
            if (currentTime - AppState.lastFpsUpdate > 1000) {
                AppState.fps = AppState.frameCount;
                AppState.frameCount = 0;
                AppState.lastFpsUpdate = currentTime;
            }

            // Smooth interpolation with frame-rate independence
            const smoothFactor = 1 - Math.pow(0.001, deltaTime);

            AppState.expansion += (AppState.targetExpansion - AppState.expansion) * CONFIG.smoothingFactor;
            AppState.rotationX += (AppState.targetRotationX - AppState.rotationX) * CONFIG.smoothingFactor;
            AppState.rotationY += (AppState.targetRotationY - AppState.rotationY) * CONFIG.smoothingFactor;

            // Apply transformations
            if (earthGroup) {
                // Base rotation (if auto-rotate enabled and no hand control)
                if (CONFIG.autoRotate && Math.abs(AppState.rotationY) < 0.01) {
                    earthGroup.rotation.y += CONFIG.rotationSpeed;
                }

                // Apply gesture-controlled rotation
                earthGroup.rotation.x = AppState.rotationX * 0.5;
                earthGroup.rotation.y += AppState.rotationY * deltaTime * 0.5;
            }

            // Terrain expansion effect
            if (terrainGroup) {
                const scale = 1 + AppState.expansion;
                terrainGroup.scale.set(scale, scale, scale);
            }

            // Animate particles
            if (particles && particles.geometry.attributes.position) {
                const positions = particles.geometry.attributes.position.array;
                const original = particles.geometry.userData.originalPositions;

                for (let i = 0; i < positions.length; i += 3) {
                    const ox = original[i];
                    const oy = original[i + 1];
                    const oz = original[i + 2];

                    // Expansion factor
                    const expansionFactor = 1 + AppState.expansion * 0.6;

                    // Add subtle wave animation
                    const wave = Math.sin(AppState.time * 2 + i * 0.01) * 0.02;

                    positions[i] = ox * expansionFactor + wave;
                    positions[i + 1] = oy * expansionFactor + wave;
                    positions[i + 2] = oz * expansionFactor;
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            // Rotate ambient particles
            if (ambientParticles) {
                ambientParticles.rotation.y += 0.0005;
                ambientParticles.rotation.x += 0.0002;
            }

            // Animate grid rings
            gridRings.forEach(ring => {
                if (ring.userData.axis === 'y') {
                    ring.rotation.z += ring.userData.rotationSpeed;
                }
            });

            // Update UI elements
            updateHexDump();

            // Render
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }

            animationId = requestAnimationFrame(animate);
        }

        // ========== BOOT SEQUENCE ==========
        async function runBootSequence() {
            const bootScreen = document.querySelector('.boot-screen');
            const bootFill = document.querySelector('.boot-fill');
            const bootLabel = document.querySelector('.boot-label');
            const bootStatus = document.querySelector('.boot-status');

            // Initialize audio
            SoundService.init();
            SpeechService.preloadVoices();

            // Run boot steps
            for (let i = 0; i < AppState.bootSteps.length; i++) {
                AppState.currentStep = i;
                bootLabel.textContent = AppState.bootSteps[i];

                const progress = ((i + 1) / AppState.bootSteps.length) * 100;
                bootFill.style.width = `${progress}%`;
                AppState.bootProgress = progress;

                SoundService.boot();

                await new Promise(resolve => setTimeout(resolve, 700));
            }

            // Initialize Three.js
            bootStatus.textContent = '正在初始化3D引擎...';
            SoundService.blip();

            initThreeJS();

            await new Promise(resolve => setTimeout(resolve, 400));

            // Initialize MediaPipe
            const video = document.getElementById('videoFeed');
            bootStatus.textContent = '正在校准手势追踪...';
            SoundService.blip();

            const mpSuccess = await MediaPipeService.init(video, processHandResults);

            if (mpSuccess) {
                bootStatus.textContent = '手势追踪初始化完成';
            } else {
                bootStatus.textContent = '摄像头访问被拒绝 - 以演示模式运行';
            }

            await new Promise(resolve => setTimeout(resolve, 500));

            bootStatus.textContent = '系统就绪，正在启动界面...';
            SoundService.blip();

            await new Promise(resolve => setTimeout(resolve, 600));

            // Play boot complete sound sequence
            SoundService.playBootSequence(() => {
                // Fade out boot screen
                bootScreen.style.opacity = '0';
                bootScreen.style.transition = 'opacity 0.8s ease';

                setTimeout(() => {
                    bootScreen.remove();
                    runIntroSequence();
                }, 800);
            });
        }

        function runIntroSequence() {
            AppState.phase = 'intro';

            const introScreen = document.querySelector('.intro-screen');
            if (!introScreen) return;

            // JARVIS voice introduction

                SpeechService.speak(

                    // Start animation loop

                            <span class="status-value">0%</span>

                        <div class="status-item">
                            <span>帧率:</span>
                            <span class="status-value">0</span>
                        </div>
                    </div>

                    <!-- Gauge Panel -->
                    <div class="gauge-panel">
                        <div class="gauge">
                            <div class="gauge-label">扩散程度</div>
                            <div class="gauge-bar">
                                <div class="gauge-fill expansion" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="gauge">
                            <div class="gauge-label">旋转角度</div>
                            <div class="gauge-bar">
                                <div class="gauge-fill rotation" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Intel Panel -->
                    <div class="intel-panel">
                        <div class="intel-title glow">情报报告</div>
                        <div class="intel-item">• 威胁等级: 低</div>
                        <div class="intel-item">• 系统完整性: 98.7%</div>
                    </div>

                    <!-- Hex Dump -->
                    <div class="hex-dump">
                        <div class="hex-title glow">数据流</div>
                        <div class="hex-content">00000000 | 00 00 | 000000</div>
                    </div>

                    <!-- Scanlines & Vignette -->
                    <div class="scanlines"></div>
                    <div class="vignette"></div>

                    <!-- HUD Borders -->
                    <div class="hud-overlay">
                        <div class="hud-corner top-left">
                            <div class="hud-border horizontal" style="top:0;left:0"></div>
                            <div class="hud-border vertical" style="top:0;left:0"></div>
                        </div>
                        <div class="hud-corner top-right">
                            <div class="hud-border horizontal" style="top:0;right:0"></div>
                            <div class="hud-border vertical" style="top:0;right:0"></div>
                        </div>
                        <div class="hud-corner bottom-right">
                            <div class="hud-border horizontal" style="bottom:0;right:0"></div>
                            <div class="hud-border vertical" style="bottom:0;right:0"></div>
                        </div>
                    </div>
                </div>
            `;

            // Show screens after DOM is ready
            setTimeout(() => {
                const introScreen = document.querySelector('.intro-screen');
                const mainApp = document.querySelector('.main-app');
                if (introScreen) introScreen.style.display = 'flex';
                if (mainApp) mainApp.style.display = 'block';

                // Start boot sequence
                runBootSequence();
            }, 100);
        }

        // Start application
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
